name: Metrics

on:
  push:
  pull_request:

jobs:
  repo-metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install project and dev dependencies
        run: python -m pip install -e .[dev]

      - name: Run repo metrics collector
        run: npm run metrics -- --output .supervisor/logs/ci.metrics.json
